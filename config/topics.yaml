topics:
  - name: PFAS
    label: "PFAS & Per/Polyfluoroalkyl Substances"
    color: "#C0392B"        # Red
    badge_color: "#E74C3C"
    description: >
      Per- and polyfluoroalkyl substance regulations, bans, and reporting requirements
      including MN Amara's Law, EPA PFAS Action Plan, state-level bans, 3M exit fallout,
      and Canadian PFAS registration.
    keywords:
      - PFAS
      - PFOA
      - PFOS
      - perfluoro
      - polyfluoro
      - fluoropolymer
      - "Amara's Law"
      - PRISM
      - "3M PFAS"
      - "PFAS ban"
      - "PFAS reporting"
      - "PFAS registration"
    federal_register_terms:
      - "per- and polyfluoroalkyl substances"
      - "PFAS"
      - "perfluoroalkyl"
    epa_search: "PFAS"
    company_relevance: >
      DIRECT: The company uses fluoropolymer coatings on manufactured components —
      these must be registered in MN PRISM portal by July 1, 2026 under Amara's Law.
      3M has exited the PFAS market, requiring alternative supplier qualification.
      The company is using Assent to collect PFAS declarations and identify reformulation
      opportunities to reduce the total number of products requiring PRISM registration.

      INDIRECT / SUPPLY CHAIN: The company buys thousands of PFAS-containing components
      from distributors — electronics and automation parts, cylinder O-rings, gaskets,
      seals, PPE, lubricants, adhesives, and more. If the upstream MANUFACTURERS of
      these items do not register in MN PRISM by July 1, 2026, their distributors
      cannot legally sell those products in Minnesota. The company is running email
      campaigns to educate their entire supply base — including distributors of
      industrial components and PPE — on the need to coordinate with their
      manufacturers (domestic and foreign) to ensure PRISM registration.
      This is an active procurement risk that could impact production lines.

  - name: EPR
    label: "Extended Producer Responsibility"
    color: "#27AE60"        # Green
    badge_color: "#2ECC71"
    description: >
      State packaging EPR laws requiring producers to fund recycling infrastructure,
      including CA SB 54, ME, OR, CO, and emerging state programs.
    keywords:
      - EPR
      - "extended producer responsibility"
      - "producer responsibility"
      - "packaging EPR"
      - "SB 54"
      - "recycled content"
      - "packaging waste"
      - "plastic packaging"
      - PRO
      - stewardship
    federal_register_terms:
      - "extended producer responsibility"
      - "packaging stewardship"
    company_relevance: >
      The company ships products with packaging in EPR states. CA SB 54 and similar laws
      may require registration with producer responsibility organizations (PROs) and
      payment of fees. Packaging redesign may be required to meet recycled content targets.

  - name: REACH
    label: "REACH & Chemical Regulation (EU/International)"
    color: "#2980B9"        # Blue
    badge_color: "#3498DB"
    description: >
      EU REACH regulation updates including SVHC (Substances of Very High Concern)
      candidate list additions, ECHA authorizations, and restrictions relevant to
      building materials and coatings suppliers.
    keywords:
      - REACH
      - SVHC
      - ECHA
      - "candidate list"
      - authorization
      - restriction
      - "substances of very high concern"
      - "EU chemicals"
    federal_register_terms: []   # REACH is EU; use ECHA RSS instead
    echa_feed: true
    company_relevance: >
      International product lines and EU-based suppliers must comply with REACH.
      SVHC additions affect supplier declarations of conformity and product data sheets.
      Relevant to European distribution and global supply chain transparency.

  - name: TSCA
    label: "TSCA & US Chemical Regulation"
    color: "#8E44AD"        # Purple
    badge_color: "#9B59B6"
    description: >
      EPA Toxic Substances Control Act actions including Section 6 risk evaluation rules,
      Section 8(a) and 8(e) reporting requirements, and new chemical notices.
    keywords:
      - TSCA
      - "toxic substances"
      - "Section 6"
      - "Section 8"
      - "risk evaluation"
      - "chemical risk"
      - "new chemical"
      - CDR
      - "chemical data reporting"
    federal_register_terms:
      - "toxic substances control act"
      - "TSCA"
      - "chemical risk evaluation"
    epa_search: "TSCA"
    company_relevance: >
      TSCA Section 6 rules can restrict or require substitution of chemicals used in
      manufacturing processes and coatings. Section 8 reporting obligations apply if
      the company manufactures or imports covered chemicals above threshold quantities.

  - name: Prop65
    label: "California Proposition 65"
    color: "#E67E22"        # Orange
    badge_color: "#F39C12"
    description: >
      California Proposition 65 (Safe Drinking Water and Toxic Enforcement Act) —
      new chemical listings, safe harbor level updates, enforcement settlements,
      60-day notices, and warning label requirements from OEHHA.
    keywords:
      - "Proposition 65"
      - "Prop 65"
      - OEHHA
      - "safe harbor"
      - "NSRL"
      - "MADL"
      - "warning label"
      - "California warning"
      - "cancer warning"
      - "reproductive harm"
      - "Prop65 listing"
      - "60-day notice"
    federal_register_terms: []   # Prop 65 is state law; use OEHHA scraper
    oehha_feed: true
    company_relevance: >
      DIRECT: The company sells products in California — the largest US market. Products
      containing listed chemicals (including PFAS, lead, cadmium, phthalates, and other
      substances present in coatings, hardware, vinyl, and adhesives) require Prop 65
      warning labels if exposures exceed safe harbor levels. Failure to warn can result
      in enforcement actions by the AG or private bounty hunters, with penalties up to
      $2,500/day per violation.

      SUPPLY CHAIN: Components purchased from suppliers may contain newly-listed
      substances. When OEHHA adds a chemical to the list, the 12-month grace period
      means compliance timelines are tight — supplier declarations of conformity must
      be updated. Hardware, fasteners, coatings, adhesives, and vinyl profiles are
      the highest-risk categories for Prop 65 listings.

      CURRENT EXPOSURE: PFAS (PFOA, PFOS) are listed. Lead and cadmium are listed and
      present in some hardware and coatings. Phthalates in vinyl profiles require
      monitoring against DINP/DEHP safe harbor levels. Track all new listings against
      the bill of materials for products sold in CA.

  - name: ConflictMinerals
    label: "Conflict Minerals (SEC/Dodd-Frank)"
    color: "#1A7A87"        # Teal
    badge_color: "#1ABC9C"
    description: >
      SEC Dodd-Frank Section 1502 conflict minerals reporting (3TG: tin, tantalum,
      tungsten, gold from DRC/adjoining countries), OECD due diligence guidance,
      EU Conflict Minerals Regulation, and emerging CSDDD supply chain due diligence.
    keywords:
      - "conflict minerals"
      - "Dodd-Frank"
      - "Section 1502"
      - "3TG"
      - "tantalum"
      - "coltan"
      - "DRC"
      - "Congo"
      - "Form SD"
      - "CMRT"
      - "responsible minerals"
      - "RMAP"
      - "RMI"
      - "smelter"
      - "CSDDD"
      - "supply chain due diligence"
    federal_register_terms:
      - "conflict minerals"
      - "Dodd-Frank section 1502"
    company_relevance: >
      DIRECT COMPLIANCE: As a manufacturer using tin (solder, hardware coatings),
      tantalum (capacitors in automation electronics), tungsten (wear-resistant coatings,
      tools), and gold (electronics contacts) — the company is very likely subject to
      SEC conflict minerals reporting if publicly traded or filing as an issuer.
      Even as a private company, major customers may require CMRT (Conflict Minerals
      Reporting Template) submission as a condition of vendor compliance programs.

      SUPPLY CHAIN: Electronics and automation components (sensors, motors, control
      boards) contain 3TG from complex supply chains. Hardware (hinges, fasteners,
      locks) may contain tin and tungsten. The requirement flows down from integrators
      to component suppliers — the company must collect CMRTs from suppliers and
      conduct reasonable country of origin inquiry (RCOI).

      EMERGING RISK: EU CSDDD (Corporate Sustainability Due Diligence Directive) extends
      supply chain due diligence obligations across all industries including manufacturing.
      Companies selling into EU markets will face mandatory human rights and environmental
      due diligence requirements. Track SEC enforcement actions, OECD guidance updates,
      and CSDDD implementation timelines.

  - name: ForcedLabor
    label: "Forced Labor & Supply Chain Transparency"
    color: "#7B241C"        # Dark red/maroon
    badge_color: "#922B21"
    description: >
      Uyghur Forced Labor Prevention Act (UFLPA) CBP enforcement, UFLPA Entity List
      updates, state supply chain transparency laws (CA SB 657, IL, etc.),
      and emerging mandatory human rights due diligence requirements.
    keywords:
      - UFLPA
      - "forced labor"
      - "Uyghur"
      - "Xinjiang"
      - "supply chain transparency"
      - "SB 657"
      - "modern slavery"
      - "human trafficking"
      - "CBP detention"
      - "withhold release order"
      - "WRO"
      - "supply chain due diligence"
      - "forced labor prevention"
    federal_register_terms:
      - "forced labor"
      - "Uyghur Forced Labor Prevention Act"
      - "withhold release order"
    company_relevance: >
      DIRECT IMPORT RISK: The company imports components manufactured in or transiting
      through Xinjiang, China — a region subject to UFLPA's rebuttable presumption of
      forced labor. High-risk categories include: aluminum (windows/frames), glass
      (solar-grade polysilicon supply chain), cotton (seals/gaskets), electronics
      (automation components, sensors). Any goods touching Xinjiang can be detained
      by CBP at the border — operational shutdown risk if critical components are held.

      UFLPA ENTITY LIST: DHS adds companies to the Entity List on an ongoing basis.
      If any tier-1 or tier-2 supplier is listed, all shipments from that supplier
      are presumed to use forced labor and require extensive documentation to release.
      Conduct proactive supplier mapping for components sourced from China.

      STATE LAWS: California SB 657 (Transparency in Supply Chains Act) and Illinois
      require disclosure of efforts to eradicate trafficking and forced labor in
      supply chains. These apply to large retailers and manufacturers with California
      operations or revenues above threshold.

      PROACTIVE STEPS: Collect supplier country-of-origin declarations for all China-
      sourced components. Map aluminum, glass, and electronics supply chains to
      identify Xinjiang exposure. Maintain UFLPA compliance documentation for CBP
      in case of detention inquiry.
